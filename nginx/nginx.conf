# nginx/nginx.conf

upstream django_backend {
    server web:8000;
}

server {
    listen 80;
    server_name localhost;

    # HTML 파일 등에서 사용할 CSS, JS 정적 파일 경로 지정
    location /static/ {
        alias /app/static/;
    }

    # 모든 일반 요청을 Django Gunicorn(또는 개발서버)으로 전달
    location / {
        proxy_pass http://django_backend;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;
        proxy_redirect off;
    }
}