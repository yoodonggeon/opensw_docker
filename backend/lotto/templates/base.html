<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>6/45 로또 서비스</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'lotto:index' %}">🎰 6/45 LOTTO</a>
            <div class="navbar-nav ms-auto">
                {% if user.is_authenticated %}
                    <span class="navbar-text me-3 text-white"><strong>{{ user.username }}</strong>님 환영합니다!</span>
                    {% if user.is_staff %}
                    <a class="nav-link text-warning fw-bold" href="{% url 'lotto:admin_dashboard' %}">🛠️ 관리자 공간</a>
                    {% endif %}
                    <a class="nav-link" href="{% url 'lotto:my_tickets' %}">내 구매내역</a>
                    <form action="{% url 'lotto:logout' %}" method="post" class="d-inline">
                        {% csrf_token %}   
                        <button type="submit" class="btn btn-link nav-link">로그아웃</button>
                    </form>
                {% else %}
                    <a class="nav-link" href="{% url 'lotto:login' %}">로그인</a>
                    <a class="nav-link" href="{% url 'lotto:signup' %}">회원가입</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}
        
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
