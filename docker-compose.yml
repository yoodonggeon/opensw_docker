version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=lotto_db
      - POSTGRES_USER=lotto_user
      - POSTGRES_PASSWORD=lotto_password
    ports:
      - "5432:5432"

  web:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_DB=lotto_db
      - POSTGRES_USER=lotto_user
      - POSTGRES_PASSWORD=lotto_password
    depends_on:
      - db

volumes:
  postgres_data: